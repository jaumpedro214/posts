<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&family=Lexend+Exa:wght@100..900&display=swap" rel="stylesheet">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./styles/chat.css">

    <title>IsRAGBrega</title>
    <script src="./scripts/main.js"></script>

</head>
<body class="body-chat">
    
    <div class="main-container" style="justify-content: flex-start;">
        <div class="title"> Is ChatGPT Brega? </div>

        <div style="display:flex; width: 100%; justify-content: center; column-gap: 15px; margin-bottom: 20px;">

            <div class="input-main-container" style="width: 60%; height: 50px;"> 
                <input class="input-field js-input-field"> 
            </div>
            <button class="button-send-main" style="height: 60px;" onclick="userQuestionFlow()"> Enviar </button>
            
        </div>


        <div class="user-question-text js-user-question-text">
            Lorem ipsum dolor sit amet, consectetur adipiscing elit. Etiam eget aliquam leo. Proin sed tellus odio. Fusce est velit, molestie sed ipsum et, consectetur egestas massa. 
        </div>

        <div
            style="
                display: flex;
                column-gap: 40px;
            "
        >

            <div class="chat-response-block">
                <div class="chat-response-title" style="background-color: #674ea7ff;"> ChatGPT </div>
                <div class="chat-response-text js-chat-simple-response-text">
                    
                    <div class="square" aria-hidden="true"></div>
                    <div class="loading-thiking js-thiking">
                        Thinking...
                    </div>
                    
                </div>
            </div>

            <div class="chat-response-block">
                <div class="chat-response-title" style="background-color: #3c78d8ff;">
                    ChatGPT + RAG

                    <img 
                        src="./img/cachorrinho-br-80ms.gif"
                        class="chat-response-block-dog-gif"
                    >

                    <img 
                        src="./img/brazil.png"
                        class="chat-response-block-brflag"
                    >
                </div>
                <div class="chat-response-text js-chat-rag-response-text">

                    <div class="square" aria-hidden="true"></div>
                    <div class="loading-thiking js-thiking">
                        Thinking...
                    </div>

                </div>


            </div>

        </div>
    </div>

</body>
</html>
