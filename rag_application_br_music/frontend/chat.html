<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&family=Lexend+Exa:wght@100..900&display=swap" rel="stylesheet">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/style.css">

    <style>

        .chat-response-block {
            background-color: white;
            width: 500px;
            height: 600px;

            border-style: solid;
            border-width: 3px;
            border-color: black;

            position: relative;
        }

        .chat-response-title {
            font-size: 30px;
            font-weight: 600;
            text-align: center;
            background-color: blue;
            color: white;

            padding-top: 10px;
            padding-bottom: 10px;

            border-bottom-style: solid;
            border-bottom-width: 3px;
            border-bottom-color: black;
        }

        .chat-response-text {
            font-size: 20px;
            text-align: justify;
            padding: 15px;

            height: 90%;
        }

        .user-question-text {
            width: 60%;

            font-size: 20px;

            background-color: white;
            border-style: solid;
            border-width: 3px;
            border-color: black;
            padding:15px;

            margin-bottom: 30px;
        }

        .chat-response-block-dog-gif {
            position: absolute;
            bottom: 90%;
            left: 80%;

            width: 150px;
        }

        .chat-response-block-brflag {
            position: absolute;
            bottom: 91%;
            left: 3%;
            width: 50px;
        }

    </style>

    <title>Document</title>
    <script src="./scripts/main.js"></script>

</head>
<body class="body-chat">
    
    <div class="main-container" style="justify-content: flex-start;">
        <div class="title"> O ChatGPT é Brega? </div>

        <div style="display:flex; width: 100%; justify-content: center; column-gap: 15px; margin-bottom: 20px;">

            <div class="input-main-container" style="width: 60%; height: 50px;"> 
                <input class="input-field"> 
            </div>
            <button class="button-send-main" style="height: 60px;" onclick="userQuestionFlow()"> Enviar </button>
            
        </div>


        <div class="user-question-text js-user-question-text">
            Lorem ipsum dolor sit amet, consectetur adipiscing elit. Etiam eget aliquam leo. Proin sed tellus odio. Fusce est velit, molestie sed ipsum et, consectetur egestas massa. 
        </div>

        <div
            style="
                display: flex;
                column-gap: 40px;
            "
        >

            <div class="chat-response-block">
                <div class="chat-response-title" style="background-color: #674ea7ff;"> ChatGPT </div>
                <div class="chat-response-text js-chat-simple-response-text"></div>
            </div>

            <div class="chat-response-block">
                <div class="chat-response-title" style="background-color: #3c78d8ff;"> ChatGPT + RAG </div>
                <div class="chat-response-text js-chat-rag-response-text"></div>

                <img 
                    src="./img/cachorrinho-br-80ms.gif"
                    class="chat-response-block-dog-gif"
                >

                <img 
                    src="./img/brazil.png"
                    class="chat-response-block-brflag"
                >
            </div>

        </div>
    </div>

</body>
</html>
